# Fly.io — needs ≥4 GB RAM for PyTorch + ViT (~344 MB) + SegFormer.
# Deploy from phytospectra_backend/:
#   fly launch --no-deploy
#   fly secrets set SUPABASE_URL=... SUPABASE_KEY=... SUPABASE_JWT_SECRET=... ESP32_DEVICE_KEY=...
#   fly secrets set CORS_ORIGINS=https://your-app.vercel.app
#   fly deploy
#
# Upload models (one-time):
#   fly ssh sftp shell
#   put models/vit_ndvi_leaf_health.pt /app/models/
#   put models/segformer_b0_v5_1.pt /app/models/

app = "phytospectra-api"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  DEVICE = "cpu"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "4096mb"
  cpu_kind = "shared"
  cpus = 2
