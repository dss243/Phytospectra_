# Render Blueprint — frontend (free) + backend (Docker, paid plan required)
# https://dashboard.render.com → New → Blueprint → connect GitHub repo Phytospectra_
#
# Before first backend deploy, upload models once from your PC:
#   cd phytospectra_backend && python scripts/upload_models.py
# (uses .env SUPABASE_KEY = service role)

services:
  # ── Frontend (static, free) ───────────────────────────────────────────────
  - type: web
    name: phytospectra-web
    runtime: static
    rootDir: Phytospectra
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_SUPABASE_URL
        value: https://vzmtbpdnnbrmhshhtaru.supabase.co
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_BACKEND_URL
        value: https://phytospectra-api.onrender.com
      - key: VITE_BACKEND_WS_URL
        value: wss://phytospectra-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Backend API (Docker) — Standard plan (~2 GB) minimum; Pro safer for ML ─
  - type: web
    name: phytospectra-api
    runtime: docker
    dockerfilePath: ./phytospectra_backend/Dockerfile
    dockerContext: ./phytospectra_backend
    plan: standard
    healthCheckPath: /api/health
    envVars:
      - key: DEVICE
        value: cpu
      - key: SUPABASE_URL
        value: https://vzmtbpdnnbrmhshhtaru.supabase.co
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_BUCKET_RAW
        value: multispectral
      - key: SUPABASE_BUCKET_HEATMAPS
        value: heatmap-images
      - key: SUPABASE_STORAGE_PUBLIC
        value: "false"
      - key: MODELS_BUCKET
        value: multispectral
      - key: MODELS_STORAGE_PREFIX
        value: _deploy/models
      - key: CORS_ORIGINS
        value: https://phytospectra.vercel.app,https://phytospectra-web.onrender.com
      - key: ESP32_DEVICE_KEY
        sync: false
      - key: OUTPUT_FOLDER
        value: /tmp/phytospectra_output
      - key: GROQ_API_KEY
        sync: false
      - key: GMAIL_SENDER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
